<!DOCTYPE html>
<html>

<head>
    <title>Home | Flask DevOps</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #111827);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            width: 420px;
        }

        h1 {
            font-size: 30px;
            margin-bottom: 10px;
        }

        p {
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .link-card {
            display: block;
            text-decoration: none;
            padding: 14px;
            margin: 12px 0;
            border-radius: 10px;
            border: 1px solid #00e5ff;
            color: #00e5ff;
            transition: 0.3s;
            text-align: left;
        }

        .link-card:hover {
            background: #00e5ff;
            color: black;
            transform: scale(1.03);
        }

        .title {
            font-weight: bold;
            display: block;
            font-size: 16px;
        }

        .desc {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 3px;
        }

        .link-card:hover .desc {
            color: black;
        }

        .hint {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>🚀 Flask DevOps Project</h1>
        <p>Learn Flask + Git step by step</p>

        <a class="link-card" href="/about">
            <span class="title">📘 About Project</span>
            <span class="desc">Know what this project is and what you are learning</span>
            <span class="hint">👉 Click to open page</span>
        </a>

        <a class="link-card" href="/git">
            <span class="title">💻 Git Learning Guide</span>
            <span class="desc">Step-by-step Git commands for beginners</span>
            <span class="hint">👉 Click to open page</span>
        </a>
    </div>
</body>

</html>
